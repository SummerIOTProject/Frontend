<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/src/styles.css">
  <meta name="description" content="SafeMeal 로그인">
  <title>로그인 | SafeMeal</title>
</head>

<body data-page="login" class="login-body">
  <main class="login-layout">
    <section class="login-brand-panel">
      <a href="/index.html" class="brand login-brand"><span class="brand-mark" aria-hidden="true"><svg
            viewBox="0 0 32 32" focusable="false">
            <path d="M6 14.5h20c0 6.2-4.5 10.5-10 10.5S6 20.7 6 14.5Z" />
            <path
              d="M9.5 27h13M10.5 10.5c0-2 1.2-3.3 2.7-4.8M17 10.5c0-2.2 1.5-3.5 3.1-5.2M23 10.5c0-1.5.8-2.6 1.8-3.7" />
          </svg></span><span><strong>세이프밀</strong><small>SAFE MEAL</small></span></a>
      <div><span class="eyebrow">SMART MEAL SERVICE</span>
        <h1>내게 맞는 만큼,<br>기분 좋은 한 끼</h1>
        <p>식사 분석과 배식량 추천을 한 곳에서 확인하세요.</p>
        <a href="/menu.html" class="login-menu-link">주간 급식 메뉴 보기 →</a>
      </div>
    </section>
    <section class="login-form-panel">
      <form id="login-form" class="login-form">
        <div><span class="eyebrow">WELCOME</span>
          <h2>로그인</h2>
          <p>학생 또는 관리자 계정으로 계속하세요.</p>
        </div>
        <label class="field"><span>로그인 아이디</span><input name="loginId" type="text" autocomplete="username"
            placeholder="로그인 아이디 입력" required></label>
        <label class="field"><span>비밀번호</span><input name="password" type="password" autocomplete="current-password"
            placeholder="비밀번호 입력" required></label>
        <div id="signup-fields" class="signup-fields" hidden>
          <label class="field"><span>이름</span><input name="name" type="text" autocomplete="name"
              placeholder="이름 입력"></label>
          <label class="field"><span>학번</span><input name="studentNumber" type="text" autocomplete="off"
              placeholder="학번 입력"></label>
        </div>
        <p id="login-message" class="field-error" role="alert"></p>
        <div class="login-actions">
          <button type="submit" class="btn primary" data-auth-action="login">로그인</button>
          <button type="button" class="btn secondary" data-auth-action="signup" aria-controls="signup-fields"
            aria-expanded="false">회원가입</button>
        </div>
      </form>
    </section>
  </main>
  <script type="module" src="/src/pages/login.js"></script>
</body>

</html>
