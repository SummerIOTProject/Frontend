<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/src/styles.css">
  <meta name="description" content="선택한 주의 급식 메뉴를 확인하는 페이지">
  <title>급식 메뉴 | SafeMeal</title>
</head>

<body data-page="menu">
  <header class="topbar">
    <a href="/menu.html" class="brand">
      <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 32 32" focusable="false"><path d="M6 14.5h20c0 6.2-4.5 10.5-10 10.5S6 20.7 6 14.5Z"/><path d="M9.5 27h13M10.5 10.5c0-2 1.2-3.3 2.7-4.8M17 10.5c0-2.2 1.5-3.5 3.1-5.2M23 10.5c0-1.5.8-2.6 1.8-3.7"/></svg></span>
      <span><strong>세이프밀</strong><small>SAFE MEAL</small></span>
    </a>
    <nav class="desktop-nav" aria-label="주요 메뉴">
      <a href="/dashboard.html" data-nav="dashboard">대시보드</a>
      <a href="/menu.html" data-nav="menu">급식 메뉴</a>
      <a href="/upload.html" data-nav="upload">업로드</a>
      <a href="/history.html" data-nav="history">식사 기록</a>
      <a href="/admin.html" data-nav="admin" data-admin-only hidden>관리자</a>
    </nav>
    <div class="account">
      <span data-user-name hidden></span>
      <button type="button" data-logout hidden>로그아웃</button>
      <a id="menu-login-link" href="/index.html">로그인</a>
    </div>
  </header>

  <main class="page menu-page">
    <header class="page-heading menu-page-heading">
      <div>
        <span class="eyebrow">WEEKLY MENU</span>
        <h1>주간 급식 메뉴</h1>
        <p>날짜를 선택하면 해당 날짜가 포함된 월요일부터 일요일까지의 점심 메뉴를 확인할 수 있습니다.</p>
      </div>
    </header>

    <section class="week-picker-panel" aria-label="급식 조회 주간 선택">
      <div class="week-navigation" aria-label="주 단위 이동">
        <button id="previous-week" type="button" class="btn secondary">이전 주</button>
        <button id="current-week" type="button" class="btn secondary">이번 주</button>
        <button id="next-week" type="button" class="btn secondary">다음 주</button>
      </div>
      <form id="menu-week-form" class="week-date-form">
        <label class="field" for="menu-week-date"><span>기준 날짜</span><input id="menu-week-date" name="date" type="date" required></label>
        <button type="submit" class="btn primary">해당 주 보기</button>
      </form>
    </section>

    <div id="menu-loading" class="state" role="status" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <strong>주간 급식 메뉴를 불러오고 있습니다.</strong>
    </div>

    <div id="menu-content" hidden aria-live="polite">
      <section class="meal-menu-summary" aria-labelledby="meal-summary-title">
        <div class="meal-menu-summary-copy">
          <span class="eyebrow">WEEKLY LUNCH</span>
          <h2 id="meal-summary-title">이번 주 점심</h2>
          <p id="meal-summary-description">주간 급식 정보를 확인하고 있습니다.</p>
        </div>
        <dl class="meal-summary-meta">
          <div><dt>기준 날짜</dt><dd id="menu-anchor-date">-</dd></div>
          <div><dt>조회 기간</dt><dd id="menu-week-range">-</dd></div>
          <div><dt>식사 유형</dt><dd id="menu-meal-type">점심</dd></div>
        </dl>
      </section>

      <section class="meal-menu-section" aria-labelledby="meal-menu-list-title">
        <div class="section-title">
          <div>
            <small>MONDAY — SUNDAY</small>
            <h2 id="meal-menu-list-title">요일별 메뉴</h2>
          </div>
          <span id="menu-count">0일 등록</span>
        </div>
        <p id="weekly-api-notice" class="weekly-api-notice" hidden></p>
        <div id="weekly-menu-grid" class="weekly-menu-grid"></div>
        <p class="menu-nutrition-note">알레르기 표시는 등록된 메뉴 정보를 기준으로 합니다.</p>
      </section>
    </div>
  </main>

  <nav class="mobile-nav" aria-label="모바일 주요 메뉴">
    <a href="/dashboard.html" data-nav="dashboard">대시보드</a>
    <a href="/menu.html" data-nav="menu">급식 메뉴</a>
    <a href="/upload.html" data-nav="upload">업로드</a>
    <a href="/history.html" data-nav="history">식사 기록</a>
  </nav>
  <script type="module" src="/src/pages/menu.js"></script>
</body>

</html>
